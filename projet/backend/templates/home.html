{% extends "layout.html" %}

{% block content %}

<h2>Feed</h2>

<form action="/add_post" method="POST">
    <input name="image" placeholder="image url">
    <input name="caption" placeholder="caption">
    <button>Post</button>
</form>

{% for post in posts %}
<div class="post">
    <img src="{{ post.image }}">
    <p>{{ post.caption }}</p>
</div>
{% endfor %}

{% endblock %}
