<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>PicProfile</title>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <h1>PicProfile</h1>
    <div class="nav-links">
      <a href="#">Home</a>
      <a href="#">Profile</a>
      <a href="#">Upload</a>
      <a href="#">Login</a>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="container">

    <!-- FEED -->
    <section class="feed">

      <!-- POST -->
      <div class="post-card">
        <img src="https://via.placeholder.com/400" alt="post">
        <div class="post-content">
          <h3>@username</h3>
          <p>Une belle photo 🌅</p>
        </div>
      </div>

      <div class="post-card">
        <img src="https://via.placeholder.com/400" alt="post">
        <div class="post-content">
          <h3>@user2</h3>
          <p>Voyage incroyable ✈️</p>
        </div>
      </div>

    </section>

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <h3>Mon Profil</h3>
      <p>@username</p>
      <button>Edit Profile</button>
    </aside>

  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <p>© 2026 PicProfile</p>
  </footer>

</body>
</html>
